<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צ'קליסט צוות חשבים — אם הנדסה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F4F3F0;--surface:#FFF;--s2:#F9F8F6;--s3:#F0EEE9;--bd:#E5E2DB;--bd2:#D0CDC5;--tx:#18171A;--tx2:#6B6760;--tx3:#A09C95;--pu:#6B5CE7;--pu2:#8B7FF0;--pub:#F0EEFF;--pud:#D4CCFF;--gn:#16794C;--gnb:#E8F5EF;--bl:#1B63C4;--blb:#EBF2FC;--am:#9A5B00;--amb:#FEF3DC;--rd:#C13030;--rdb:#FDEAEA;--tl:#0D7A6E;--tlb:#E1F4F2;--r:8px;--rsm:5px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999}
.ld-logo{font-size:24px;font-weight:700;color:var(--pu)}
.ld-sub{font-size:13px;color:var(--tx3)}
.ld-bar{width:180px;height:2px;background:var(--bd);border-radius:2px;overflow:hidden}
.ld-fill{height:100%;background:var(--pu);border-radius:2px;animation:ldgo 1.4s ease forwards}
@keyframes ldgo{0%{width:0}100%{width:100%}}
.app{display:grid;grid-template-rows:56px 1fr;min-height:100vh}
nav{background:var(--surface);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:0;position:sticky;top:0;z-index:100}
.nav-logo{font-size:15px;font-weight:700;color:var(--pu);padding-left:16px;border-left:1px solid var(--bd);margin-left:16px;white-space:nowrap}
.nav-logo small{font-weight:400;color:var(--tx3);font-size:12px;margin-right:6px}
.nav-tabs{display:flex;align-items:center;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.ntab{display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:var(--rsm);cursor:pointer;white-space:nowrap;font-size:13px;font-weight:500;color:var(--tx2);border:none;background:transparent;transition:all .15s;font-family:inherit}
.ntab:hover{background:var(--s3);color:var(--tx)}
.ntab.on{background:var(--pub);color:var(--pu)}
.ntab .av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.ntab .cnt{font-size:11px;padding:1px 6px;border-radius:10px;background:var(--s3);color:var(--tx3)}
.ntab.on .cnt{background:var(--pud);color:var(--pu)}
.ntab .rmb{display:none;background:none;border:none;cursor:pointer;padding:2px;color:var(--tx3);border-radius:3px;line-height:0;font-family:inherit}
.ntab:hover .rmb{display:flex}
.ntab .rmb:hover{color:var(--rd)}
.ntab .rmb svg{width:12px;height:12px}
.ns{flex:1}
.nav-acts{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--rsm);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap}
.btn svg{width:14px;height:14px;flex-shrink:0}
.bg{background:transparent;color:var(--tx2);border-color:var(--bd)}.bg:hover{background:var(--s3);color:var(--tx);border-color:var(--bd2)}
.bp{background:var(--pu);color:#fff;border-color:var(--pu)}.bp:hover{background:#5848D0}
.body{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 56px);overflow:hidden}
.sidebar{border-left:1px solid var(--bd);background:var(--surface);overflow-y:auto;padding:16px 0}
.sb-lbl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.7px;padding:0 16px 8px}
.sb-sec{margin-bottom:20px}
.prog-block{padding:12px 16px 16px}
.ring-row{display:flex;align-items:center;gap:14px}
.ring-wrap{position:relative;width:64px;height:64px;flex-shrink:0}
.ring-svg{transform:rotate(-90deg);width:64px;height:64px}
.rbg{fill:none;stroke:var(--bd);stroke-width:4}
.rfg{fill:none;stroke:var(--pu);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .5s ease}
.ring-inn{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:14px;font-weight:700;color:var(--tx);line-height:1}
.ring-sub{font-size:9px;color:var(--tx3);margin-top:1px}
.ring-sts{flex:1}
.ring-st{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.ring-sl{font-size:12px;color:var(--tx2)}
.ring-sn{font-size:13px;font-weight:600;color:var(--tx)}
.fi{display:flex;align-items:center;gap:8px;padding:6px 16px;cursor:pointer;font-size:13px;color:var(--tx2);transition:background .1s}
.fi:hover{background:var(--s3);color:var(--tx)}
.fi.on{background:var(--pub);color:var(--pu)}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fn{font-size:11px;color:var(--tx3);margin-right:auto}
.fi.on .fn{color:var(--pu)}
.co-nav-item{display:flex;align-items:center;gap:8px;padding:5px 16px;cursor:pointer;font-size:12px;color:var(--tx2);transition:background .1s}
.co-nav-item:hover{background:var(--s3);color:var(--tx)}
.co-nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.co-nav-p{font-size:10px;color:var(--tx3);margin-right:auto}
.main{overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.toolbar{display:flex;gap:10px;align-items:center}
.sw{position:relative;flex:1;max-width:320px}
.sw svg{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--tx3);pointer-events:none}
.si{width:100%;font-family:inherit;font-size:13px;padding:7px 32px 7px 10px;border:1px solid var(--bd);border-radius:var(--rsm);background:var(--surface);color:var(--tx)}
.si:focus{outline:none;border-color:var(--pu2)}
.tr{margin-right:auto;display:flex;gap:8px}
.chip{font-size:12px;padding:5px 10px;border-radius:20px;border:1px solid var(--bd);background:var(--surface);color:var(--tx2);cursor:pointer;transition:all .12s;font-family:inherit}
.chip:hover{border-color:var(--bd2);color:var(--tx)}
.chip.on{background:var(--pub);border-color:var(--pud);color:var(--pu)}
.co-card{background:var(--surface);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.co-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;transition:background .1s}
.co-head:hover{background:var(--s2)}
.chev{color:var(--tx3);transition:transform .2s;flex-shrink:0}
.chev.op{transform:rotate(180deg)}
.co-name{font-size:15px;font-weight:600;color:var(--tx);flex:1}
.co-bdg{display:flex;align-items:center;gap:7px}
.otag{font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px}
.dtag{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--s3);color:var(--tx3)}
.dtag.full{background:var(--gnb);color:var(--gn)}
.pbw{height:2px;background:var(--bd)}
.pbf{height:100%;background:var(--pu);transition:width .4s ease}
.cod{background:none;border:none;cursor:pointer;padding:4px;border-radius:4px;color:var(--tx3);display:flex;transition:all .12s}
.cod:hover{background:var(--rdb);color:var(--rd)}
.cod svg{width:14px;height:14px}
.tlist{padding:4px 0}
.trow{display:flex;align-items:flex-start;gap:10px;padding:8px 16px;border-top:1px solid var(--bd);transition:background .1s}
.trow:hover{background:var(--s2)}
.tcb{width:15px;height:15px;margin-top:1px;accent-color:var(--pu);flex-shrink:0;cursor:pointer}
.tbody{flex:1;min-width:0}
.ttx{font-size:13px;color:var(--tx);line-height:1.5;word-break:break-word}
.ttx.dn{text-decoration:line-through;color:var(--tx3)}
.tnote{font-size:11px;color:var(--am);margin-top:2px;line-height:1.4}
.tnote.soft{color:var(--tx3)}
.ttags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.ftag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;white-space:nowrap}
.fd{background:var(--gnb);color:var(--gn)}
.fw{background:var(--amb);color:var(--am)}
.fm{background:var(--blb);color:var(--bl)}
.fq{background:var(--pub);color:var(--pu)}
.fa{background:var(--rdb);color:var(--rd)}
.fad{background:var(--s3);color:var(--tx3)}
.tacts{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0;margin-top:1px}
.trow:hover .tacts{opacity:1}
.ib{background:none;border:none;cursor:pointer;padding:3px;border-radius:4px;color:var(--tx3);display:flex;transition:all .12s}
.ib:hover{background:var(--bd);color:var(--tx)}
.ib.dl:hover{background:var(--rdb);color:var(--rd)}
.ib svg{width:13px;height:13px}
.atbar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-top:1px solid var(--bd);background:var(--s2)}
.ati{flex:1;font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid var(--bd);border-radius:var(--rsm);background:var(--surface);color:var(--tx)}
.ati:focus{outline:none;border-color:var(--pu2)}
.atsel{font-family:inherit;font-size:12px;padding:6px 7px;border:1px solid var(--bd);border-radius:var(--rsm);background:var(--surface);color:var(--tx2)}
.atsel:focus{outline:none;border-color:var(--pu2)}
.atbtn{width:28px;height:28px;background:var(--pu);border:none;border-radius:var(--rsm);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.atbtn:hover{background:#5848D0}
.atbtn svg{width:14px;height:14px}
.empty-c{padding:28px 16px;text-align:center;color:var(--tx3);font-size:12px}
.back{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.back.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--r);box-shadow:0 4px 24px rgba(0,0,0,.12);padding:22px;width:100%;max-width:400px}
.mtitle{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:16px}
.mrow{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.mlbl{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px}
.modal input,.modal select{font-family:inherit;font-size:14px;padding:8px 11px;border:1px solid var(--bd);border-radius:var(--rsm);background:var(--surface);color:var(--tx);width:100%}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--pu2)}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(6px);background:#18171A;color:#fff;font-size:13px;padding:9px 18px;border-radius:var(--r);opacity:0;pointer-events:none;transition:all .25s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hid{display:none!important}
.freq-group-header{display:flex;align-items:center;gap:8px;padding:8px 16px 4px;border-top:1px solid var(--bd)}
.freq-group-header:first-child{border-top:none}
.fgh-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.fgh-lbl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.fgh-line{flex:1;height:1px;background:var(--bd)}
</style>
</head>
<body>
<div id="loader"><div class="ld-logo">אם הנדסה</div><div class="ld-sub">טוען נתונים...</div><div class="ld-bar"><div class="ld-fill"></div></div></div>
<div class="app">

    <button class="btn bp" onclick="openAddSec()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>הוסף חברה</button>
  </div>
</nav>
<div class="body">
<aside class="sidebar">
  <div class="sb-sec"><div class="sb-lbl">התקדמות</div>
    <div class="prog-block"><div class="ring-row">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 64 64"><circle class="rbg" cx="32" cy="32" r="26"/><circle class="rfg" id="rfg" cx="32" cy="32" r="26" stroke-dasharray="163.36" stroke-dashoffset="163.36"/></svg>
        <div class="ring-inn"><div class="ring-pct" id="rpct">0%</div><div class="ring-sub">בוצע</div></div>
      </div>
      <div class="ring-sts">
        <div class="ring-st"><span class="ring-sl">בוצעו</span><span class="ring-sn" id="sdn">0</span></div>
        <div class="ring-st"><span class="ring-sl">נותרו</span><span class="ring-sn" id="slt">0</span></div>

      </div>
    </div></div>
  </div>
  <div class="sb-sec"><div class="sb-lbl">לפי תדירות</div><div id="flist"></div></div>

<main class="main" id="main">
  <div class="toolbar">

  </div>
  <div id="colist"></div>
</main>
</div>
</div>

<div class="back" id="m-mem">
  <div class="modal"><div class="mtitle">הוספת עובד לצוות</div>
    <div class="mrow"><div class="mlbl">שם</div><input id="mm-name" placeholder="לדוגמה: שניר"></div>
    <div class="mrow"><div class="mlbl">תפקיד</div><select id="mm-role"><option value="חשב">חשב</option><option value="חשב איחוד">חשב איחוד</option><option value="מנהלת חשבונות">מנהלת חשבונות</option><option value="עוזר חשב">עוזר חשב</option></select></div>
    <div class="mrow"><div class="mlbl">צבע</div><select id="mm-col"><option value="purple">סגול</option><option value="green">ירוק</option><option value="blue">כחול</option><option value="amber">כתום</option><option value="teal">טורקיז</option><option value="red">אדום</option></select></div>
    <div class="mfoot"><button class="btn bg" onclick="closeM('m-mem')">ביטול</button><button class="btn bp" onclick="confirmMem()">הוסף</button></div>
  </div>
</div>

<div class="back" id="m-sec">
  <div class="modal"><div class="mtitle">הוספת חברה / קטגוריה</div>
    <div class="mrow"><div class="mlbl">שם החברה</div><input id="ms-name" placeholder="לדוגמה: גיאוכום + גרנד"></div>
    <div class="mrow"><div class="mlbl">אחראי ראשי</div><select id="ms-own"></select></div>
    <div class="mfoot"><button class="btn bg" onclick="closeM('m-sec')">ביטול</button><button class="btn bp" onclick="confirmSec()">הוסף</button></div>
  </div>
</div>

<div class="back" id="m-task">
  <div class="modal"><div class="mtitle">עריכת משימה</div>
    <div class="mrow"><div class="mlbl">תיאור</div><input id="mt-tx"></div>
    <div class="mrow"><div class="mlbl">תדירות</div><select id="mt-fr"><option value="daily">יומי</option><option value="weekly">שבועי</option><option value="monthly">חודשי</option><option value="quarterly">רבעוני</option><option value="annual">שנתי</option><option value="adhoc">לפי צורך</option></select></div>
    <div class="mrow"><div class="mlbl">הערה</div><input id="mt-nt" placeholder="הערה אופציונלית"></div>
    <div class="mfoot"><button class="btn bg" onclick="closeM('m-task')">ביטול</button><button class="btn bp" onclick="confirmTask()">שמור</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

const CM={purple:{bg:"var(--pub)",tx:"var(--pu)",bd:"var(--pud)"},green:{bg:"var(--gnb)",tx:"var(--gn)",bd:"#A8DCC3"},blue:{bg:"var(--blb)",tx:"var(--bl)",bd:"#B3D0F5"},amber:{bg:"var(--amb)",tx:"var(--am)",bd:"#F5D99A"},teal:{bg:"var(--tlb)",tx:"var(--tl)",bd:"#9FD9D3"},red:{bg:"var(--rdb)",tx:"var(--rd)",bd:"#F5AEAE"}};
const S={mem:{},sec:{},tsk:{},open:{},owner:"all",freq:"all",chips:{done:false}};

signInAnonymously(auth).then(async()=>{
  const snap=await new Promise(r=>onValue(ref(db,"sections"),r,{onlyOnce:true}));
  const existing=snap.val()||{};
  if(Object.keys(existing).length===0){await seed()}
  listen();document.getElementById("loader").style.display="none";
}).catch(()=>{document.getElementById("loader").style.display="none";toast("שגיאת Firebase")});
async function seed(){
  for(const m of DM){await set(push(ref(db,"members")),m)}
  for(const s of DS){const{tasks:tks,...meta}=s;const sr=push(ref(db,"sections"));await set(sr,meta);for(const t of tks)await set(push(ref(db,"tasks/"+sr.key)),t)}
}
function listen(){
  onValue(ref(db,"members"),s=>{S.mem=s.val()||{};render()});
  onValue(ref(db,"sections"),s=>{S.sec=s.val()||{};render()});
  onValue(ref(db,"tasks"),s=>{S.tsk=s.val()||{};render()});
}
function gc(name){const m=Object.values(S.mem).find(x=>x.name===name);return CM[m?.color||"purple"]||CM.purple}
function ini(n){return(n||"?").slice(0,2)}
window.render=function(){rNav();rSide();rMain()};
function rNav(){
  const oc={};Object.entries(S.sec||{}).forEach(([sid,s])=>{const c=Object.keys(S.tsk[sid]||{}).length;oc[s.owner]=(oc[s.owner]||0)+c});
  const tot=Object.values(S.tsk).reduce((a,t)=>a+Object.keys(t).length,0);
  let h=`<button class="ntab${S.owner==="all"?" on":""}" onclick="setOwner('all')"><div class="av" style="background:var(--pub);color:var(--pu)">כל</div><span>כולם</span><span class="cnt">${tot}</span></button>`;
  Object.entries(S.mem).forEach(([mid,m])=>{const c=CM[m.color||"purple"]||CM.purple;h+=`<button class="ntab${S.owner===m.name?" on":""}" onclick="setOwner('${m.name}')"><div class="av" style="background:${c.bg};color:${c.tx}">${ini(m.name)}</div><span>${m.name}</span><span class="cnt">${oc[m.name]||0}</span><button class="rmb" onclick="delMem(event,'${mid}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></button>`});
  document.getElementById("ntabs").innerHTML=h;
  document.getElementById("ms-own").innerHTML=Object.values(S.mem).map(m=>`<option value="${m.name}">${m.name}</option>`).join("");
}
function rSide(){
  const{tot,dn}=calcP();const pct=tot?Math.round(dn/tot*100):0;const C=163.36;
  document.getElementById("rfg").style.strokeDashoffset=C-(C*pct/100);
  document.getElementById("rpct").textContent=pct+"%";
  document.getElementById("sdn").textContent=dn;
  document.getElementById("slt").textContent=tot-dn;
  document.getElementById("stl").textContent=tot;
  const fc={};Object.entries(S.tsk).forEach(([sid,st])=>{const s=S.sec[sid];if(S.owner!=="all"&&s?.owner!==S.owner)return;Object.values(st).forEach(t=>{fc[t.freq]=(fc[t.freq]||0)+1})});
  let fh=`<div class="fi${S.freq==="all"?" on":""}" onclick="setFreq('all')"><div class="fdot" style="background:var(--bd2)"></div><span>הכל</span></div>`;
  Object.entries(FL).forEach(([k,v])=>{fh+=`<div class="fi${S.freq===k?" on":""}" onclick="setFreq('${k}')"><div class="fdot" style="background:${FD[k]}"></div><span>${v}</span><span class="fn">${fc[k]||0}</span></div>`});
  document.getElementById("flist").innerHTML=fh;
  const sorted=Object.entries(S.sec).sort(([,a],[,b])=>(a.order||0)-(b.order||0));
  let ch="";
  sorted.forEach(([sid,s])=>{if(S.owner!=="all"&&s.owner!==S.owner)return;const st=S.tsk[sid]||{};const t=Object.keys(st).length,d=Object.values(st).filter(x=>x.done).length;ch+=`<div class="co-nav-item" onclick="scTo('co-${sid}')"><div class="co-nav-dot" style="background:${gc(s.owner).tx}"></div><span>${s.name}</span><span class="co-nav-p">${t?Math.round(d/t*100):0}%</span></div>`});
  document.getElementById("conav").innerHTML=ch||'<div style="padding:6px 16px;font-size:12px;color:var(--tx3)">אין חברות</div>';
}
function calcP(){let tot=0,dn=0;Object.entries(S.tsk).forEach(([sid,st])=>{const s=S.sec[sid];if(S.owner!=="all"&&s?.owner!==S.owner)return;Object.values(st).forEach(t=>{tot++;if(t.done)dn++})});return{tot,dn}}
function rMain(){
  const srch=(document.getElementById("srch")?.value||"").toLowerCase().trim();
  const hd=S.chips.done;
  document.getElementById("chip-done").className="chip"+(hd?" on":"");
  const sorted=Object.entries(S.sec).sort(([,a],[,b])=>(a.order||0)-(b.order||0));
  let html="";
  sorted.forEach(([sid,s])=>{
    if(S.owner!=="all"&&s.owner!==S.owner)return;
    const st=S.tsk[sid]||{};
    const filt=Object.entries(st).filter(([,t])=>{if(S.freq!=="all"&&t.freq!==S.freq)return false;if(hd&&t.done)return false;if(srch&&!t.text.toLowerCase().includes(srch)&&!(t.note||"").toLowerCase().includes(srch))return false;return true});
    const tot=Object.keys(st).length,dn=Object.values(st).filter(t=>t.done).length;
    const pw=tot?Math.round(dn/tot*100):0;
    const isOpen=S.open[sid]!==false;
    const c=gc(s.owner);
    // Group tasks by freq in order
    let tasksHtml="";
    if(filt.length){
      const groups={};
      filt.forEach(([tid,t])=>{if(!groups[t.freq])groups[t.freq]=[];groups[t.freq].push([tid,t])});
      FREQ_ORDER.forEach(fk=>{
        if(!groups[fk]||!groups[fk].length)return;
        tasksHtml+=`<div class="freq-group-header"><div class="fgh-dot" style="background:${FD[fk]}"></div><span class="fgh-lbl">${FL[fk]}</span><div class="fgh-line"></div></div>`;
        tasksHtml+=groups[fk].map(([tid,t])=>tRow(sid,tid,t)).join("");
      });
    } else {
      tasksHtml='<div class="empty-c">אין משימות תואמות</div>';
    }
    html+=`<div class="co-card" id="co-${sid}">
<div class="co-head" onclick="togSec('${sid}')">
<svg class="chev${isOpen?" op":""}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
<div class="co-name">${s.name}</div>
<div class="co-bdg">
<span class="otag" style="background:${c.bg};color:${c.tx}">${s.owner}</span>
<span class="dtag${dn===tot&&tot>0?" full":""}">${dn}/${tot}</span>
<button class="cod" onclick="delSec(event,'${sid}')" title="מחק חברה"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg></button>
</div></div>
<div class="pbw"><div class="pbf" style="width:${pw}%"></div></div>
${isOpen?`<div class="tlist">${tasksHtml}</div><div class="atbar"><input class="ati" id="nt-${sid}" type="text" placeholder="הוסף משימה..." onkeydown="if(event.key==='Enter')addTask('${sid}')"><select class="atsel" id="nf-${sid}">${Object.entries(FL).map(([k,v])=>`<option value="${k}">${v}</option>`).join("")}</select><button class="atbtn" onclick="addTask('${sid}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button></div>`:""}
</div>`;
  });
  document.getElementById("colist").innerHTML=html||'<div style="padding:60px;text-align:center;color:var(--tx3)">אין חברות</div>';
}
function tRow(sid,tid,t){const fc=FC[t.freq]||"fad";const fl=FL[t.freq]||t.freq;const iw=t.note?.startsWith("❗");return`<div class="trow"><input type="checkbox" class="tcb" ${t.done?"checked":""} onchange="togTask('${sid}','${tid}',this.checked)"><div class="tbody"><div class="ttx${t.done?" dn":""}">${t.text}</div>${t.note?`<div class="tnote${iw?"":" soft"}">${t.note}</div>`:""}<div class="ttags"><span class="ftag ${fc}">${fl}</span></div></div><div class="tacts"><button class="ib" onclick="openEdit('${sid}','${tid}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg></button><button class="ib dl" onclick="delTask('${sid}','${tid}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg></button></div></div>`}

window.openAddSec=()=>{document.getElementById("ms-name").value="";openM("m-sec")};
window.confirmSec=()=>{const n=document.getElementById("ms-name").value.trim();const o=document.getElementById("ms-own").value;if(!n)return;const mx=Math.max(0,...Object.values(S.sec).map(s=>s.order||0));push(ref(db,"sections"),{name:n,owner:o,order:mx+1});closeM("m-sec");toast("נוספה ✓")};
window.resetDone=()=>{if(!confirm("לאפס כל הסימונים?"))return;Object.entries(S.tsk).forEach(([sid,st])=>Object.keys(st).forEach(tid=>update(ref(db,`tasks/${sid}/${tid}`),{done:false})));toast("אופס ✓")};
window.openM=id=>document.getElementById(id).classList.add("open");
window.closeM=id=>document.getElementById(id).classList.remove("open");
document.querySelectorAll(".back").forEach(el=>el.addEventListener("click",e=>{if(e.target===el)el.classList.remove("open")}));
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500)}
window.toast=toast;
</script>
</body>
</html>
